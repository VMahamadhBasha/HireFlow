<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear LocalStorage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #1a202c;
            margin-top: 0;
        }
        p {
            color: #4a5568;
            line-height: 1.6;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 0.5rem;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .success {
            color: #22c55e;
            margin-top: 1rem;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ Clear Storage</h1>
        <p>Clear all localStorage data to load fresh dummy data with new names (sathis, suresh, ramu, kalan)</p>
        <button onclick="clearStorage()">Clear LocalStorage</button>
        <button onclick="goBack()">Go Back</button>
        <p class="success" id="successMsg">✅ Storage cleared! Refreshing...</p>
    </div>

    <script>
        function clearStorage() {
            localStorage.clear();
            document.getElementById('successMsg').style.display = 'block';
            setTimeout(() => {
                window.location.href = 'http://localhost:3000';
            }, 1500);
        }
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
